# *.reeveos.site — Customer websites
# Catches all subdomains and proxies to the backend website renderer
# Install: cp reeveos-site.conf /etc/nginx/sites-available/ && ln -s /etc/nginx/sites-available/reeveos-site.conf /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name *.reeveos.site reeveos.site;

    # Extract subdomain from Host header
    # e.g. rejuvenate-skin-experts.reeveos.site → rejuvenate-skin-experts
    set $subdomain "";
    if ($host ~* ^([^.]+)\.reeveos\.site$) {
        set $subdomain $1;
    }

    # Root domain (no subdomain) → redirect to reeveos.app marketing site
    location / {
        # If no subdomain, redirect to main site
        if ($subdomain = "") {
            return 301 https://reeveos.app;
        }

        # Proxy to backend website renderer
        proxy_pass http://127.0.0.1:8000/site/$subdomain$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $subdomain;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # Static assets (tracker.js, cookie-consent.js)
    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8000/site/$subdomain/sitemap.xml;
        proxy_set_header Host $host;
    }

    # Robots.txt
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8000/site/$subdomain/robots.txt;
        proxy_set_header Host $host;
    }

    # Favicon fallback
    location = /favicon.ico {
        return 204;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
