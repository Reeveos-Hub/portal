# reeveos.link — Survey & Link Shortener domain
# Place in: /etc/nginx/sites-available/reeveos.link
# Symlink: ln -s /etc/nginx/sites-available/reeveos.link /etc/nginx/sites-enabled/
# Certbot: certbot --nginx -d reeveos.link -d www.reeveos.link

server {
    listen 80;
    server_name reeveos.link www.reeveos.link;
    return 301 https://reeveos.link$request_uri;
}

server {
    listen 443 ssl;
    server_name www.reeveos.link;

    # SSL certs will be added by certbot
    # ssl_certificate /etc/letsencrypt/live/reeveos.link/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/reeveos.link/privkey.pem;

    return 301 https://reeveos.link$request_uri;
}

server {
    listen 443 ssl;
    server_name reeveos.link;

    # SSL certs will be added by certbot
    # ssl_certificate /etc/letsencrypt/live/reeveos.link/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/reeveos.link/privkey.pem;

    root /var/www/reeveos.link;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Main page — serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block common attack paths
    location ~ /\. { deny all; }
    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin) { return 444; }
}
