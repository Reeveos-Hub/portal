# reeveos.link — Survey domain
# STEP 1: This config serves HTTP only (port 80)
# STEP 2: Run certbot --nginx -d reeveos.link -d www.reeveos.link
# Certbot will automatically add the SSL blocks and HTTP→HTTPS redirect

# Redirect www to non-www (HTTP)
server {
    listen 80;
    server_name www.reeveos.link;
    return 301 http://reeveos.link$request_uri;
}

# Main site (HTTP — certbot upgrades this to HTTPS automatically)
server {
    listen 80;
    server_name reeveos.link;

    root /var/www/reeveos.link;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve the survey
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fonts and images
    location ~* \.(woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Block common attack paths
    location ~ /\. { deny all; }
    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin) { return 444; }
}
