<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>ReeveOS — Help Us Build Something Better</title>
<meta name="description" content="Quick survey for beauty & wellness professionals. Tell us what's missing from your current platform.">
<meta property="og:title" content="ReeveOS — Quick Survey for Beauty Pros">
<meta property="og:description" content="Help shape the future of booking, payments and business management. Takes 2 minutes.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #111111; --gold: #C9A84C; --gold-light: #E8D5A0;
    --gold-glow: rgba(201, 168, 76, 0.15); --white: #FFFFFF;
    --grey-400: #9C9C96; --grey-600: #6B6B65; --grey-800: #333330;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  html { height: 100%; background: var(--black); }
  body {
    min-height: 100%; height: 100%; font-family: 'Figtree', sans-serif;
    background: var(--black); color: var(--white); -webkit-font-smoothing: antialiased;
    overflow: hidden; position: fixed; width: 100%;
    overscroll-behavior: none; -webkit-overflow-scrolling: touch;
  }
  .app { height: 100%; display: flex; flex-direction: column; position: relative; }
  .header {
    padding: 16px 20px; padding-top: calc(16px + var(--safe-top));
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 10; flex-shrink: 0;
  }
  .logo { font-weight: 800; font-size: 22px; letter-spacing: -0.5px; color: var(--white); }
  .logo span { color: var(--gold); }
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-text { font-size: 12px; font-weight: 600; color: var(--grey-400); min-width: 32px; text-align: right; }
  .progress-bar { width: 60px; height: 3px; background: var(--grey-800); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  @media (min-width: 400px) { .progress-bar { width: 80px; } .header { padding: 20px 24px; padding-top: calc(20px + var(--safe-top)); } }

  .slides-viewport { flex: 1; overflow: hidden; position: relative; min-height: 0; }
  .slide {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    opacity: 0; transform: translateY(40px); pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
  }
  .slide-inner {
    padding: 8px 20px 120px; max-width: 600px; width: 100%; margin: 0 auto;
    padding-top: min(12vh, 70px);
  }
  @media (min-height: 700px) { .slide-inner { padding-top: min(18vh, 110px); } }
  @media (min-width: 400px) { .slide-inner { padding: 8px 28px 120px; padding-top: min(12vh, 70px); } }
  @media (min-width: 400px) and (min-height: 700px) { .slide-inner { padding-top: min(18vh, 110px); } }
  .slide.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .slide.exit-up { opacity: 0; transform: translateY(-40px); pointer-events: none; }

  .welcome-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--gold-glow); border: 1px solid rgba(201, 168, 76, 0.25);
    padding: 6px 12px; border-radius: 100px; font-size: 11px; font-weight: 600;
    color: var(--gold); text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 20px; width: fit-content;
  }
  .welcome-badge svg { width: 14px; height: 14px; fill: var(--gold); }
  .slide-question { font-size: 24px; font-weight: 700; line-height: 1.25; letter-spacing: -0.3px; margin-bottom: 10px; color: var(--white); }
  @media (min-width: 400px) { .slide-question { font-size: clamp(26px, 5vw, 36px); } }
  .slide-sub { font-size: 15px; font-weight: 400; color: var(--grey-400); line-height: 1.5; margin-bottom: 24px; max-width: 440px; }
  @media (max-width: 360px) { .slide-sub { font-size: 14px; margin-bottom: 18px; } .welcome-badge { margin-bottom: 14px; } }

  .text-input {
    width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--grey-800);
    padding: 12px 0; font-family: 'Figtree', sans-serif; font-size: max(18px, 1rem);
    font-weight: 400; color: var(--white); outline: none; transition: border-color 0.3s;
    caret-color: var(--gold); border-radius: 0; -webkit-appearance: none;
  }
  .text-input::placeholder { color: var(--grey-600); }
  .text-input:focus { border-bottom-color: var(--gold); }
  .textarea-input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--grey-800);
    border-radius: 12px; padding: 14px; font-family: 'Figtree', sans-serif;
    font-size: max(16px, 1rem); color: var(--white); outline: none; resize: none;
    min-height: 90px; transition: border-color 0.3s; caret-color: var(--gold); -webkit-appearance: none;
  }
  .textarea-input::placeholder { color: var(--grey-600); }
  .textarea-input:focus { border-color: var(--gold); }

  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn {
    display: flex; align-items: center; gap: 12px; width: 100%;
    background: rgba(255,255,255,0.04); border: 1px solid var(--grey-800);
    border-radius: 10px; padding: 14px; min-height: 48px; cursor: pointer;
    transition: all 0.2s; text-align: left; font-family: 'Figtree', sans-serif;
    color: var(--white); -webkit-tap-highlight-color: transparent;
  }
  .choice-btn:hover, .choice-btn:focus-visible { background: var(--gold-glow); border-color: var(--gold); }
  .choice-btn.selected { background: var(--gold-glow); border-color: var(--gold); }
  .choice-btn:active { transform: scale(0.98); }
  .choice-key {
    width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--grey-600);
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    font-weight: 700; color: var(--grey-400); flex-shrink: 0; transition: all 0.2s;
  }
  .choice-btn.selected .choice-key, .choice-btn:hover .choice-key { border-color: var(--gold); background: var(--gold); color: var(--black); }
  .choice-label { font-size: 15px; font-weight: 500; line-height: 1.3; }
  @media (max-width: 360px) { .choice-btn { padding: 12px; gap: 10px; } .choice-label { font-size: 14px; } .choices { gap: 6px; } }
  .multi-hint { font-size: 12px; color: var(--grey-600); margin-bottom: 10px; font-weight: 500; }
  .choice-btn .check-box {
    width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--grey-600);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;
  }
  .choice-btn.selected .check-box { border-color: var(--gold); background: var(--gold); }
  .check-box svg { width: 12px; height: 12px; stroke: var(--black); stroke-width: 3; fill: none; opacity: 0; transition: opacity 0.15s; }
  .choice-btn.selected .check-box svg { opacity: 1; }

  .rating-row { display: flex; gap: 6px; margin-top: 4px; }
  .rating-btn {
    flex: 1; max-width: 56px; aspect-ratio: 1; border-radius: 10px;
    border: 1px solid var(--grey-800); background: rgba(255,255,255,0.04);
    font-family: 'Figtree', sans-serif; font-size: 18px; font-weight: 600;
    color: var(--grey-400); cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    min-height: 48px; -webkit-tap-highlight-color: transparent;
  }
  .rating-btn:hover { border-color: var(--gold); color: var(--white); }
  .rating-btn.selected { background: var(--gold); border-color: var(--gold); color: var(--black); }
  .rating-btn:active { transform: scale(0.95); }
  .rating-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--grey-600); font-weight: 500; }

  .consent-label {
    display: flex; align-items: flex-start; gap: 12px; cursor: pointer; padding: 16px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--grey-800);
    border-radius: 12px; transition: all 0.25s; -webkit-tap-highlight-color: transparent;
  }
  .consent-label:hover { border-color: var(--gold); }
  .consent-label.checked { background: var(--gold-glow); border-color: var(--gold); }
  .consent-box {
    width: 24px; height: 24px; min-width: 24px; border-radius: 6px;
    border: 2px solid var(--grey-600); display: flex; align-items: center;
    justify-content: center; transition: all 0.2s; margin-top: 1px;
  }
  .consent-label.checked .consent-box { border-color: var(--gold); background: var(--gold); }
  .consent-box svg { width: 14px; height: 14px; stroke: var(--black); stroke-width: 3; fill: none; opacity: 0; transition: opacity 0.15s; }
  .consent-label.checked .consent-box svg { opacity: 1; }
  .consent-text { font-size: 13px; color: var(--grey-400); line-height: 1.6; }
  .consent-text strong { color: var(--white); }

  .thankyou-icon {
    width: 56px; height: 56px; border-radius: 50%; background: var(--gold-glow);
    border: 2px solid var(--gold); display: flex; align-items: center;
    justify-content: center; margin-bottom: 20px;
  }
  .thankyou-icon svg { width: 24px; height: 24px; stroke: var(--gold); fill: none; stroke-width: 2.5; }
  .pilot-card {
    background: rgba(201, 168, 76, 0.08); border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 14px; padding: 20px; margin-top: 24px;
  }
  .pilot-card h3 { font-size: 17px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
  .pilot-card p { font-size: 14px; color: var(--grey-400); line-height: 1.6; }
  .pilot-card .hl { color: var(--white); font-weight: 600; }

  .footer {
    position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 20px;
    padding-bottom: calc(12px + var(--safe-bottom)); display: flex;
    align-items: center; justify-content: space-between; z-index: 10;
    background: linear-gradient(transparent 0%, var(--black) 50%);
    pointer-events: none;
  }
  .footer > * { pointer-events: auto; }
  .btn-back {
    background: none; border: none; color: var(--grey-400); font-family: 'Figtree', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; padding: 12px 14px;
    border-radius: 8px; transition: color 0.2s; display: flex; align-items: center; gap: 4px;
    min-height: 44px; -webkit-tap-highlight-color: transparent;
  }
  .btn-back:hover { color: var(--white); }
  .btn-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
  .btn-next {
    background: var(--gold); color: var(--black); border: none; font-family: 'Figtree', sans-serif;
    font-size: 15px; font-weight: 700; padding: 12px 24px; border-radius: 10px; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    min-height: 44px; -webkit-tap-highlight-color: transparent;
  }
  .btn-next:hover { background: var(--gold-light); }
  .btn-next:active { transform: scale(0.97); }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-next svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; }

  .other-input-wrap { margin-top: 8px; overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
  .other-input-wrap.show { max-height: 60px; }
  .enter-hint { display: none; align-items: center; gap: 6px; margin-top: 12px; font-size: 13px; color: var(--grey-600); font-weight: 500; }
  .enter-hint kbd { background: var(--grey-800); padding: 2px 8px; border-radius: 4px; font-family: 'Figtree', sans-serif; font-size: 11px; font-weight: 700; color: var(--grey-400); }
  @media (min-width: 768px) and (hover: hover) { .enter-hint { display: flex; } }

  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 256px;
  }
  .ambient {
    position: fixed; top: -200px; right: -200px; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .keyboard-open .slide-inner { padding-top: 12px !important; }
  .keyboard-open .footer { display: none; }
  .keyboard-open .slide-sub { margin-bottom: 14px; }
</style>
</head>
<body>
<div class="grain"></div>
<div class="ambient"></div>
<div class="app" id="app">
  <header class="header">
    <div class="logo">R<span>.</span></div>
    <div class="progress-wrap" id="progressWrap" style="opacity:0">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
  </header>
  <div class="slides-viewport" id="viewport"></div>
  <div class="footer" id="footerNav">
    <button class="btn-back" id="btnBack" style="visibility:hidden" aria-label="Go back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> Back
    </button>
    <button class="btn-next" id="btnNext" disabled>
      OK <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>
</div>
<script>
(function(){
  'use strict';
  var questions=[
    {id:'welcome',type:'welcome',badge:'Takes 2 minutes',question:"We're building something\nbetter for beauty.",sub:"Help shape the future of booking, payments and business management for beauty & wellness professionals.",buttonText:"Let's go"},
    {id:'name',type:'text',question:"First, what's your name?",sub:"Just your first name is fine.",placeholder:"Type your name\u2026",required:true},
    {id:'business_name',type:'text',question:"What's your business called?",sub:"Salon, clinic, studio \u2014 whatever it is.",placeholder:"e.g. Glow Studio, The Beauty Room\u2026",required:true},
    {id:'business_type',type:'choice',question:"What best describes you?",sub:"",choices:['Hair Salon','Beauty Salon','Aesthetics Clinic','Barbershop','Nail Salon / Tech','Spa & Wellness','Mobile / Freelance','Other'],hasOther:true},
    {id:'team_size',type:'choice',question:"How big is your team?",sub:"Including yourself.",choices:['Just me','2\u20133 people','4\u20136 people','7\u201310 people','10+']},
    {id:'current_platform',type:'choice',question:"What booking platform do you use?",sub:"The main one you rely on day to day.",choices:['Fresha','Treatwell','Timely','Square Appointments','Booksy','Pen & paper / none','Other'],hasOther:true},
    {id:'platform_cost',type:'text',question:"Roughly, what do you pay per month?",sub:"Booking system, processing fees \u2014 the lot.",placeholder:"e.g. \u00a350, \u00a3120, not sure\u2026",required:false},
    {id:'platform_rating',type:'rating',question:"How happy are you with your current setup?",sub:"1 = frustrated, 5 = love it.",min:1,max:5,minLabel:'Frustrated',maxLabel:'Love it'},
    {id:'pain_points',type:'multi',question:"What frustrates you most?",sub:"Pick as many as apply.",choices:['No-shows & late cancellations','High fees / poor value','Clunky or outdated software','No proper client records',"Can't take deposits or booking fees",'Poor reporting / no insights','No website or online presence','Card processing is separate','Other'],hasOther:true},
    {id:'wishlist',type:'textarea',question:"Dream platform \u2014 what would it do?",sub:"No wrong answers. We're genuinely listening.",placeholder:"Type anything that comes to mind\u2026",required:false},
    {id:'payment_processing',type:'choice',question:"Who handles your card payments?",sub:"The company processing your transactions.",choices:['SumUp','Zettle (PayPal)','Square','Dojo','Worldpay','Stripe',"Don't take cards yet",'Other'],hasOther:true},
    {id:'interest',type:'multi',question:"Would any of these interest you?",sub:"Tick all that sound useful.",choices:['Free trial of a new all-in-one platform','Lower card processing rates','Built-in consultation forms (GDPR)','Automated SMS & email reminders','Client booking app with your branding','A proper website included in your plan']},
    {id:'contact',type:'text',question:"How can we reach you?",sub:"Phone, email or Instagram \u2014 whatever's easiest.",placeholder:"e.g. 07700 900000 or @yourstudio",required:true},
    {id:'gdpr_consent',type:'consent',question:"Nearly there \u2014 one legal bit.",sub:"We need your permission to store your answers and contact you."},
    {id:'thankyou',type:'thankyou'}
  ];
  var current=0,answers={};
  var viewport=document.getElementById('viewport'),btnNext=document.getElementById('btnNext'),btnBack=document.getElementById('btnBack');
  var progressFill=document.getElementById('progressFill'),progressText=document.getElementById('progressText'),progressWrap=document.getElementById('progressWrap'),footerNav=document.getElementById('footerNav');
  var initialHeight=window.innerHeight;
  function checkKB(){var d=initialHeight-window.innerHeight;document.body.classList.toggle('keyboard-open',d>150);}
  window.addEventListener('resize',checkKB);
  if(window.visualViewport){window.visualViewport.addEventListener('resize',function(){var d=initialHeight-window.visualViewport.height;document.body.classList.toggle('keyboard-open',d>150);});}

  function buildSlides(){questions.forEach(function(q,i){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='slide-'+i;d.setAttribute('role','group');d.innerHTML='<div class="slide-inner">'+renderSlide(q)+'</div>';viewport.appendChild(d);});}
  function renderSlide(q){
    switch(q.type){
      case 'welcome':return '<div class="welcome-badge"><svg viewBox="0 0 24 24"><path d="M12 2L14.09 8.26L21 9.27L16 14.14L17.18 21.02L12 17.77L6.82 21.02L8 14.14L3 9.27L9.91 8.26L12 2Z"/></svg>'+q.badge+'</div><h1 class="slide-question" style="white-space:pre-line">'+q.question+'</h1><p class="slide-sub">'+q.sub+'</p>';
      case 'text':return '<h2 class="slide-question">'+q.question+'</h2>'+(q.sub?'<p class="slide-sub">'+q.sub+'</p>':'')+'<input type="text" class="text-input" id="input-'+q.id+'" placeholder="'+(q.placeholder||'')+'" autocomplete="off" enterkeyhint="next"><div class="enter-hint"><kbd>Enter</kbd> to continue</div>';
      case 'textarea':return '<h2 class="slide-question">'+q.question+'</h2>'+(q.sub?'<p class="slide-sub">'+q.sub+'</p>':'')+'<textarea class="textarea-input" id="input-'+q.id+'" placeholder="'+(q.placeholder||'')+'" rows="3"></textarea>';
      case 'choice':var h='<h2 class="slide-question">'+q.question+'</h2>'+(q.sub?'<p class="slide-sub">'+q.sub+'</p>':'')+'<div class="choices" id="choices-'+q.id+'">';q.choices.forEach(function(c,ci){h+='<button class="choice-btn" data-value="'+c+'"><span class="choice-key">'+String.fromCharCode(65+ci)+'</span><span class="choice-label">'+c+'</span></button>';});h+='</div>';if(q.hasOther)h+='<div class="other-input-wrap" id="other-wrap-'+q.id+'"><input type="text" class="text-input" id="other-'+q.id+'" placeholder="Please specify\u2026" autocomplete="off"></div>';return h;
      case 'multi':var m='<h2 class="slide-question">'+q.question+'</h2>'+(q.sub?'<p class="slide-sub">'+q.sub+'</p>':'')+'<p class="multi-hint">Select all that apply</p><div class="choices" id="choices-'+q.id+'">';q.choices.forEach(function(c){m+='<button class="choice-btn" data-value="'+c+'"><span class="check-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span class="choice-label">'+c+'</span></button>';});m+='</div>';if(q.hasOther)m+='<div class="other-input-wrap" id="other-wrap-'+q.id+'"><input type="text" class="text-input" id="other-'+q.id+'" placeholder="Please specify\u2026" autocomplete="off"></div>';return m;
      case 'rating':var r='<h2 class="slide-question">'+q.question+'</h2>'+(q.sub?'<p class="slide-sub">'+q.sub+'</p>':'')+'<div class="rating-row" id="rating-'+q.id+'">';for(var n=q.min;n<=q.max;n++){r+='<button class="rating-btn" data-value="'+n+'">'+n+'</button>';}return r+'</div><div class="rating-labels"><span>'+q.minLabel+'</span><span>'+q.maxLabel+'</span></div>';
      case 'consent':return '<h2 class="slide-question">'+q.question+'</h2>'+(q.sub?'<p class="slide-sub">'+q.sub+'</p>':'')+'<label class="consent-label" id="consent-'+q.id+'"><span class="consent-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span class="consent-text">I agree to ReeveOS storing my responses and contacting me about their platform. I can request deletion anytime by emailing <strong>hello@reeveos.app</strong>.</span></label>';
      case 'thankyou':return '<div class="thankyou-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><h2 class="slide-question">You\'re a star. Thank you!</h2><p class="slide-sub">Your answers are shaping something built for people like you \u2014 not another one-size-fits-all platform.</p><div class="pilot-card"><h3>Free Pilot Programme</h3><p>We\'re offering a <span class="hl">free trial</span> to a small group of beauty & wellness professionals before public launch. <span class="hl">No commitment, no card details.</span></p><p style="margin-top:10px">We\'ll be in touch soon.</p></div>';
    }
  }
  function goTo(idx){if(idx<0||idx>=questions.length)return;var prev=document.getElementById('slide-'+current);var next=document.getElementById('slide-'+idx);prev.className=idx>current?'slide exit-up':'slide';setTimeout(function(){next.className='slide active';next.scrollTop=0;},50);current=idx;updateUI();focusInput();}
  function updateUI(){var q=questions[current];var totalQ=questions.length-2;var currentQ=Math.max(0,current-1);var pct=q.type==='thankyou'?100:Math.round((currentQ/totalQ)*100);progressFill.style.width=pct+'%';progressText.textContent=pct+'%';progressWrap.style.opacity=(q.type==='welcome'||q.type==='thankyou')?'0':'1';btnBack.style.visibility=current>0&&q.type!=='thankyou'?'visible':'hidden';if(q.type==='welcome'){btnNext.innerHTML=q.buttonText+' <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>';btnNext.disabled=false;}else if(q.type==='thankyou'){footerNav.style.display='none';}else{btnNext.innerHTML='OK <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>';validateCurrent();}}
  function focusInput(){var q=questions[current];if(q.type==='text'){var inp=document.getElementById('input-'+q.id);if(inp)setTimeout(function(){inp.focus();},350);}else if(q.type==='textarea'){var ta=document.getElementById('input-'+q.id);if(ta)setTimeout(function(){ta.focus();},350);}}
  function validateCurrent(){var q=questions[current];var valid=true;if(q.type==='text'&&q.required){valid=((document.getElementById('input-'+q.id)||{}).value||'').trim().length>0;}else if(q.type==='choice'){valid=!!answers[q.id];}else if(q.type==='multi'){valid=true;}else if(q.type==='rating'){valid=!!answers[q.id];}else if(q.type==='consent'){valid=answers[q.id]===true;}btnNext.disabled=!valid;}
  function saveCurrent(){var q=questions[current];if(q.type==='text'){answers[q.id]=((document.getElementById('input-'+q.id)||{}).value||'').trim();}else if(q.type==='textarea'){answers[q.id]=((document.getElementById('input-'+q.id)||{}).value||'').trim();}}
  function init(){
    buildSlides();updateUI();
    btnNext.addEventListener('click',function(){saveCurrent();if(current===questions.length-2)submitForm();goTo(current+1);});
    btnBack.addEventListener('click',function(){goTo(current-1);});
    viewport.addEventListener('click',function(e){var cl=e.target.closest('.consent-label');if(cl){cl.classList.toggle('checked');answers[questions[current].id]=cl.classList.contains('checked');validateCurrent();return;}var btn=e.target.closest('.choice-btn');if(!btn){var rb=e.target.closest('.rating-btn');if(rb)handleRating(rb);return;}handleChoice(btn);});
    viewport.addEventListener('input',function(){validateCurrent();});
    viewport.addEventListener('keydown',function(e){if(e.key==='Enter'){var q=questions[current];if(q.type==='textarea'&&!e.metaKey&&!e.ctrlKey)return;if(!btnNext.disabled){e.preventDefault();btnNext.click();}}});
    document.addEventListener('keydown',function(e){var q=questions[current];if(q.type==='choice'||q.type==='multi'){var idx=e.key.toUpperCase().charCodeAt(0)-65;var ch=document.querySelectorAll('#choices-'+q.id+' .choice-btn');if(idx>=0&&idx<ch.length)ch[idx].click();}});
  }
  function handleChoice(btn){var q=questions[current];var val=btn.dataset.value;var c=btn.parentElement;if(q.type==='multi'){btn.classList.toggle('selected');var sel=[];c.querySelectorAll('.selected').forEach(function(b){sel.push(b.dataset.value);});answers[q.id]=sel;if(q.hasOther){var w=document.getElementById('other-wrap-'+q.id);var ho=sel.indexOf('Other')!==-1;w.classList.toggle('show',ho);if(ho)setTimeout(function(){var o=document.getElementById('other-'+q.id);if(o)o.focus();},200);}}else{c.querySelectorAll('.choice-btn').forEach(function(b){b.classList.remove('selected');});btn.classList.add('selected');answers[q.id]=val;if(q.hasOther){var w2=document.getElementById('other-wrap-'+q.id);w2.classList.toggle('show',val==='Other');if(val==='Other'){setTimeout(function(){var o2=document.getElementById('other-'+q.id);if(o2)o2.focus();},200);}else{setTimeout(function(){if(!btnNext.disabled)btnNext.click();},400);}}else{setTimeout(function(){if(!btnNext.disabled)btnNext.click();},400);}}validateCurrent();}
  function handleRating(btn){var c=btn.parentElement;c.querySelectorAll('.rating-btn').forEach(function(b){b.classList.remove('selected');});btn.classList.add('selected');answers[questions[current].id]=btn.dataset.value;validateCurrent();setTimeout(function(){if(!btnNext.disabled)btnNext.click();},400);}
  function submitForm(){questions.forEach(function(q){if(q.hasOther&&answers[q.id]){var oi=document.getElementById('other-'+q.id);if(oi&&oi.value.trim()){if(Array.isArray(answers[q.id])){answers[q.id]=answers[q.id].map(function(v){return v==='Other'?'Other: '+oi.value.trim():v;});}else if(answers[q.id]==='Other'){answers[q.id]='Other: '+oi.value.trim();}}}});fetch('https://portal.rezvo.app/api/public/survey',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(answers)}).then(function(r){if(!r.ok)return r.json().then(function(d){throw new Error(d.detail||'Failed');});return r.json();}).then(function(d){console.log('Survey submitted:',d.id);}).catch(function(e){console.error('Survey error:',e);});}
  init();
})();
</script>
</body>
</html>
