<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio — Retina Website Capture</title>
  <meta name="description" content="Capture pixel-perfect retina screenshots of any website in seconds" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23111'/%3E%3Ccircle cx='16' cy='15' r='6' stroke='%23C9A84C' stroke-width='2' fill='none'/%3E%3Ccircle cx='16' cy='15' r='2.5' fill='%23C9A84C'/%3E%3Cpath d='M8 8h4l2-3h4l2 3h4a2 2 0 012 2v12a2 2 0 01-2 2H8a2 2 0 01-2-2V10a2 2 0 012-2z' stroke='%23C9A84C' stroke-width='1.5' fill='none'/%3E%3C/svg%3E" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --gold: #C9A84C;
      --gold-light: #D4B96A;
      --gold-dim: rgba(201,168,76,0.15);
      --gold-glow: rgba(201,168,76,0.3);
      --surface: #1A1A1A;
      --surface-2: #222222;
      --surface-3: #2A2A2A;
      --border: #333333;
      --border-light: #444444;
      --text: #FFFFFF;
      --text-2: #AAAAAA;
      --text-3: #777777;
      --green: #34D399;
      --red: #F87171;
    }

    html, body, #root { height: 100%; }
    body {
      font-family: 'Figtree', -apple-system, sans-serif;
      background: var(--black);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 0 0 var(--gold-glow); } 50% { box-shadow: 0 0 0 6px transparent; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    .fade-up { animation: fadeUp 0.3s ease-out both; }
    .spin { animation: spin 1s linear infinite; }
    .pulse-gold { animation: pulse-gold 2s ease-in-out infinite; }

    .shimmer {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }

    /* Input */
    input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }
    input[type="text"]::placeholder { color: var(--text-3); }

    /* Checkbox */
    input[type="checkbox"] {
      appearance: none;
      width: 16px; height: 16px;
      border: 2px solid var(--border-light);
      border-radius: 4px;
      background: var(--surface);
      cursor: pointer;
      position: relative;
      transition: all 0.15s;
    }
    input[type="checkbox"]:checked {
      background: var(--gold);
      border-color: var(--gold);
    }
    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 4px; height: 8px;
      border: solid var(--black);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    /* Button base */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 700;
      font-size: 13px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-gold {
      background: var(--gold);
      color: var(--black);
    }
    .btn-gold:not(:disabled):hover {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--gold-glow);
    }
    .btn-gold:not(:disabled):active { transform: translateY(0); }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: var(--surface-3);
      color: var(--text);
      border-color: var(--border-light);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    /* Lightbox */
    .lightbox-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .lightbox-overlay img {
      max-width: 95vw; max-height: 95vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8000'
      : '';

    /* ─── SVG Icons ─── */
    const Icon = ({ name, size = 18, className = '' }) => {
      const icons = {
        camera: <><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>,
        monitor: <><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>,
        tablet: <><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></>,
        phone: <><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></>,
        download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        trash: <><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
        clock: <><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></>,
        check: <polyline points="20,6 9,17 4,12"/>,
        x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        loader: <><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></>,
        image: <><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></>,
        globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
        zap: <polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/>,
        eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
        refresh: <><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>,
        grid: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
        type: <><polyline points="4,7 4,4 20,4 20,7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>,
        maximize: <><polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>,
        sidebar: <><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></>,
        list: <><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>,
        external: <><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></>,
        figma: <><path d="M5 5.5A3.5 3.5 0 0 1 8.5 2H12v7H8.5A3.5 3.5 0 0 1 5 5.5z"/><path d="M12 2h3.5a3.5 3.5 0 1 1 0 7H12V2z"/><path d="M12 12.5a3.5 3.5 0 1 1 7 0 3.5 3.5 0 1 1-7 0z"/><path d="M5 19.5A3.5 3.5 0 0 1 8.5 16H12v3.5a3.5 3.5 0 1 1-7 0z"/><path d="M5 12.5A3.5 3.5 0 0 1 8.5 9H12v7H8.5A3.5 3.5 0 0 1 5 12.5z"/></>,
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round"
          strokeLinejoin="round" style={{ flexShrink: 0 }} className={className}>
          {icons[name]}
        </svg>
      );
    };

    /* ─── Viewport presets ─── */
    const VIEWPORTS = [
      { id: 'desktop', label: 'Desktop', icon: 'monitor', w: 1440, h: 900 },
      { id: 'tablet', label: 'Tablet', icon: 'tablet', w: 768, h: 1024 },
      { id: 'mobile', label: 'Mobile', icon: 'phone', w: 375, h: 812 },
    ];

    /* ─── Helpers ─── */
    const fmtTime = (s) => s < 60 ? `${s.toFixed(1)}s` : `${Math.floor(s/60)}m ${(s%60).toFixed(0)}s`;
    const fmtSize = (mb) => mb < 1 ? `${(mb*1024).toFixed(0)} KB` : `${mb.toFixed(2)} MB`;
    const fmtDate = (iso) => {
      const d = new Date(iso), now = new Date(), diff = (now - d) / 1000;
      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    };

    /* ═══════════════════════════════════════ */
    /*            STUDIO APP                   */
    /* ═══════════════════════════════════════ */
    function App() {
      const [url, setUrl] = useState('');
      const [viewport, setViewport] = useState('desktop');
      const [capturing, setCapturing] = useState(false);
      const [currentJob, setCurrentJob] = useState(null);
      const [jobs, setJobs] = useState([]);
      const [showHistory, setShowHistory] = useState(false);
      const [lightboxSrc, setLightboxSrc] = useState(null);
      const [figmaExporting, setFigmaExporting] = useState(false);

      const exportToFigma = async (jobId) => {
        setFigmaExporting(true);
        try {
          const resp = await fetch(`${API_BASE}/api/studio/jobs/${jobId}/figma`, { method: 'POST' });
          if (!resp.ok) throw new Error(await resp.text());
          const data = await resp.json();
          // Download the SVG
          const link = document.createElement('a');
          link.href = `${API_BASE}${data.svg_path}`;
          link.download = `figma_export_${jobId}.svg`;
          link.click();
        } catch (err) {
          alert(`Figma export failed: ${err.message}`);
        } finally {
          setFigmaExporting(false);
        }
      };
      const [cookieDismiss, setCookieDismiss] = useState(true);
      const [hideOverlays, setHideOverlays] = useState(true);
      const progressRef = useRef(null);

      useEffect(() => { loadJobs(); }, []);

      const loadJobs = async () => {
        try {
          const res = await fetch(`${API_BASE}/api/studio/jobs`);
          if (res.ok) {
            const data = await res.json();
            setJobs(data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)));
          }
        } catch(e) { console.error(e); }
      };

      const startCapture = async () => {
        if (!url.trim() || capturing) return;
        let cleanUrl = url.trim();
        if (!/^https?:\/\//i.test(cleanUrl)) cleanUrl = 'https://' + cleanUrl;

        setCapturing(true);
        setCurrentJob(null);
        setShowHistory(false);

        try {
          const res = await fetch(`${API_BASE}/api/studio/capture`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: cleanUrl, viewport, cookie_dismiss: cookieDismiss, hide_overlays: hideOverlays }),
          });
          const data = await res.json();
          setCurrentJob(data);
          setCapturing(false);
          loadJobs();
        } catch(e) {
          setCurrentJob({ status: 'error', error: e.message, steps: [] });
          setCapturing(false);
        }
      };

      const deleteJob = async (jobId, e) => {
        e && e.stopPropagation();
        try {
          await fetch(`${API_BASE}/api/studio/jobs/${jobId}`, { method: 'DELETE' });
          setJobs(prev => prev.filter(j => j.job_id !== jobId));
          if (currentJob?.job_id === jobId) setCurrentJob(null);
        } catch(e) { console.error(e); }
      };

      const selectJob = (job) => {
        setCurrentJob(job);
        setShowHistory(false);
      };

      useEffect(() => {
        if (progressRef.current) progressRef.current.scrollTop = progressRef.current.scrollHeight;
      }, [currentJob?.steps]);

      const completedJobs = jobs.filter(j => j.status === 'complete');

      return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>

          {/* ─── Top Bar ─── */}
          <header style={{
            height: 56, minHeight: 56,
            background: 'var(--surface)',
            borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center',
            padding: '0 20px', gap: 16,
          }}>
            {/* Logo */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{
                width: 32, height: 32, borderRadius: 8,
                background: 'var(--gold)', display: 'flex',
                alignItems: 'center', justifyContent: 'center',
              }}>
                <Icon name="camera" size={16} className="" />
              </div>
              <span style={{ fontWeight: 800, fontSize: 16, letterSpacing: '-0.3px' }}>Studio</span>
              <span style={{
                fontSize: 10, fontWeight: 700, color: 'var(--gold)',
                background: 'var(--gold-dim)', padding: '2px 8px',
                borderRadius: 6, letterSpacing: '0.5px',
              }}>BETA</span>
            </div>

            <div style={{ flex: 1 }} />

            {/* History toggle */}
            <button
              onClick={() => setShowHistory(!showHistory)}
              className="btn btn-ghost"
              style={{ padding: '6px 14px', fontSize: 12, gap: 6, borderRadius: 8 }}
            >
              <Icon name="grid" size={14} />
              History
              {jobs.length > 0 && (
                <span style={{
                  background: 'var(--gold-dim)', color: 'var(--gold)',
                  fontSize: 10, fontWeight: 800, padding: '1px 6px',
                  borderRadius: 4, marginLeft: 2,
                }}>{jobs.length}</span>
              )}
            </button>
          </header>

          {/* ─── Main Content ─── */}
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>

            {/* ═══ HISTORY PANEL (slide-in) ═══ */}
            {showHistory && (
              <div style={{
                width: 320, minWidth: 320, borderRight: '1px solid var(--border)',
                background: 'var(--surface)', overflow: 'auto', padding: 16,
              }} className="fade-up">
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-2)' }}>
                    {jobs.length} capture{jobs.length !== 1 ? 's' : ''}
                  </span>
                  <button onClick={loadJobs} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-3)', display:'flex' }}>
                    <Icon name="refresh" size={14} />
                  </button>
                </div>

                {jobs.length === 0 ? (
                  <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--text-3)' }}>
                    <Icon name="image" size={28} />
                    <p style={{ marginTop: 8, fontSize: 13 }}>No captures yet</p>
                  </div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {jobs.map(job => (
                      <div
                        key={job.job_id}
                        onClick={() => selectJob(job)}
                        style={{
                          background: currentJob?.job_id === job.job_id ? 'var(--surface-3)' : 'var(--surface-2)',
                          border: `1px solid ${currentJob?.job_id === job.job_id ? 'var(--gold)' : 'var(--border)'}`,
                          borderRadius: 12, overflow: 'hidden', cursor: 'pointer',
                          transition: 'all 0.15s',
                        }}
                      >
                        {/* Thumbnail */}
                        <div style={{
                          height: 100, background: 'var(--black)',
                          overflow: 'hidden', position: 'relative',
                        }}>
                          {job.status === 'complete' && job.thumbnail_path ? (
                            <img src={`${API_BASE}${job.thumbnail_path}`} alt=""
                              style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'top' }} />
                          ) : (
                            <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}>
                              <Icon name={job.status === 'error' ? 'x' : 'loader'} size={20}
                                style={{ color: job.status === 'error' ? 'var(--red)' : 'var(--text-3)' }} />
                            </div>
                          )}
                          {/* Delete */}
                          <button onClick={(e) => deleteJob(job.job_id, e)} style={{
                            position:'absolute', top:6, right:6, width:24, height:24,
                            borderRadius:6, background:'rgba(0,0,0,0.7)', border:'none',
                            cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
                            color:'var(--text-2)', opacity:0.5, transition:'all 0.15s',
                          }}
                          onMouseEnter={e => { e.target.style.opacity = 1; e.target.style.color = 'var(--red)'; }}
                          onMouseLeave={e => { e.target.style.opacity = 0.5; e.target.style.color = 'var(--text-2)'; }}
                          >
                            <Icon name="trash" size={12} />
                          </button>
                          {/* Viewport badge */}
                          <span style={{
                            position:'absolute', bottom:6, left:6,
                            background:'rgba(0,0,0,0.7)', color:'white',
                            fontSize:9, fontWeight:800, padding:'2px 6px',
                            borderRadius:4, textTransform:'uppercase', letterSpacing:'0.5px',
                          }}>{job.viewport || 'desktop'}</span>
                        </div>

                        <div style={{ padding: '8px 10px' }}>
                          <div style={{ fontSize:12, fontWeight:700, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                            {job.page_title || job.url}
                          </div>
                          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:4 }}>
                            <span style={{ fontSize:10, color:'var(--text-3)' }}>{fmtDate(job.created_at)}</span>
                            {job.status === 'complete' ? (
                              <span style={{ fontSize:9, fontWeight:800, color:'var(--green)', background:'rgba(52,211,153,0.1)', padding:'1px 6px', borderRadius:4 }}>
                                {job.capture?.pixel_width}×{job.capture?.pixel_height}
                              </span>
                            ) : (
                              <span style={{ fontSize:9, fontWeight:800, color:'var(--red)', background:'rgba(248,113,113,0.1)', padding:'1px 6px', borderRadius:4 }}>
                                Failed
                              </span>
                            )}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ═══ MAIN AREA ═══ */}
            <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column' }}>

              {/* ─── Capture Bar ─── */}
              <div style={{
                padding: '16px 24px',
                borderBottom: '1px solid var(--border)',
                background: 'var(--surface)',
              }}>
                <div style={{ display: 'flex', gap: 12, alignItems: 'stretch', maxWidth: 900, margin: '0 auto' }}>
                  {/* URL Input */}
                  <div style={{ flex: 1, position: 'relative' }}>
                    <div style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', color:'var(--text-3)' }}>
                      <Icon name="globe" size={16} />
                    </div>
                    <input
                      type="text"
                      value={url}
                      onChange={e => setUrl(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && startCapture()}
                      placeholder="Enter any website URL…"
                      style={{
                        width: '100%', padding: '12px 14px 12px 42px',
                        borderRadius: 10, fontSize: 14, fontWeight: 500,
                      }}
                    />
                  </div>

                  {/* Viewport toggles */}
                  <div style={{
                    display: 'flex', gap: 2, background: 'var(--surface-2)',
                    borderRadius: 10, padding: 3, border: '1px solid var(--border)',
                  }}>
                    {VIEWPORTS.map(v => (
                      <button
                        key={v.id}
                        onClick={() => setViewport(v.id)}
                        title={`${v.label} (${v.w}×${v.h})`}
                        style={{
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          width: 40, height: 40, borderRadius: 8, border: 'none',
                          cursor: 'pointer', transition: 'all 0.15s',
                          background: viewport === v.id ? 'var(--gold)' : 'transparent',
                          color: viewport === v.id ? 'var(--black)' : 'var(--text-3)',
                        }}
                      >
                        <Icon name={v.icon} size={16} />
                      </button>
                    ))}
                  </div>

                  {/* Capture button */}
                  <button
                    onClick={startCapture}
                    disabled={!url.trim() || capturing}
                    className="btn btn-gold"
                    style={{ padding: '12px 24px', borderRadius: 10, fontSize: 13 }}
                  >
                    {capturing ? (
                      <><Icon name="loader" size={16} className="spin" /> Capturing…</>
                    ) : (
                      <><Icon name="zap" size={16} /> Capture</>
                    )}
                  </button>
                </div>

                {/* Options row */}
                <div style={{ display:'flex', gap:16, maxWidth:900, margin:'8px auto 0', paddingLeft:4 }}>
                  <label style={{ display:'flex', alignItems:'center', gap:6, cursor:'pointer', fontSize:12, color:'var(--text-3)', fontWeight:500 }}>
                    <input type="checkbox" checked={cookieDismiss} onChange={e => setCookieDismiss(e.target.checked)} />
                    Dismiss cookies
                  </label>
                  <label style={{ display:'flex', alignItems:'center', gap:6, cursor:'pointer', fontSize:12, color:'var(--text-3)', fontWeight:500 }}>
                    <input type="checkbox" checked={hideOverlays} onChange={e => setHideOverlays(e.target.checked)} />
                    Hide overlays
                  </label>
                  <span style={{ fontSize:11, color:'var(--text-3)', marginLeft:'auto', display:'flex', alignItems:'center', gap:4 }}>
                    <Icon name="monitor" size={12} />
                    {VIEWPORTS.find(v => v.id === viewport)?.w}×{VIEWPORTS.find(v => v.id === viewport)?.h} @ 3× retina
                  </span>
                </div>
              </div>

              {/* ─── Result Area ─── */}
              <div style={{ flex: 1, overflow: 'auto', padding: 24 }}>

                {/* Capturing state */}
                {capturing && !currentJob && (
                  <div style={{ maxWidth:600, margin:'80px auto', textAlign:'center' }} className="fade-up">
                    <div style={{
                      width:64, height:64, borderRadius:16, background:'var(--gold-dim)',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      margin:'0 auto 20px',
                    }} className="pulse-gold">
                      <Icon name="camera" size={28} style={{ color:'var(--gold)' }} />
                    </div>
                    <h2 style={{ fontSize:18, fontWeight:800, marginBottom:6 }}>Capturing screenshot…</h2>
                    <p style={{ fontSize:13, color:'var(--text-3)' }}>Launching browser, navigating, scrolling for lazy content</p>
                    <div style={{ width:200, height:3, borderRadius:2, margin:'24px auto', overflow:'hidden' }} className="shimmer" />
                  </div>
                )}

                {/* Complete result */}
                {currentJob?.status === 'complete' && (
                  <div style={{ maxWidth: 1100, margin: '0 auto' }} className="fade-up">
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 24 }}>

                      {/* Screenshot */}
                      <div className="card" style={{ overflow: 'hidden' }}>
                        <div style={{
                          background: '#0A0A0A', padding: 16,
                          borderBottom: '1px solid var(--border)',
                          cursor: 'zoom-in',
                        }}
                          onClick={() => setLightboxSrc(`${API_BASE}${currentJob.screenshot_path}`)}
                        >
                          <img
                            src={`${API_BASE}${currentJob.screenshot_path}`}
                            alt={currentJob.page_title}
                            style={{
                              width: '100%', maxHeight: 500,
                              objectFit: 'contain', objectPosition: 'top',
                              borderRadius: 8,
                            }}
                          />
                        </div>
                        <div style={{ padding:'12px 16px', display:'flex', alignItems:'center', gap:8 }}>
                          <a
                            href={`${API_BASE}${currentJob.screenshot_path}`}
                            download target="_blank" rel="noopener"
                            className="btn btn-gold" style={{ flex:1, padding:'10px 16px', borderRadius:8 }}
                          >
                            <Icon name="download" size={15} />
                            Download PNG
                          </a>
                          <button
                            onClick={() => exportToFigma(currentJob.job_id)}
                            disabled={figmaExporting}
                            className="btn" style={{
                              flex:1, padding:'10px 16px', borderRadius:8,
                              background: figmaExporting ? '#333' : '#a259ff',
                              color:'#fff', border:'none', cursor: figmaExporting ? 'wait' : 'pointer',
                              display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                              fontWeight:700, fontSize:13,
                            }}
                          >
                            <Icon name="figma" size={15} />
                            {figmaExporting ? 'Exporting...' : 'Export Figma SVG'}
                          </button>
                          <button
                            onClick={() => setLightboxSrc(`${API_BASE}${currentJob.screenshot_path}`)}
                            className="btn btn-ghost" style={{ padding:'10px 14px', borderRadius:8 }}
                          >
                            <Icon name="maximize" size={15} />
                          </button>
                          <button
                            onClick={() => { setUrl(currentJob.url); setCurrentJob(null); }}
                            className="btn btn-ghost" style={{ padding:'10px 14px', borderRadius:8 }}
                          >
                            <Icon name="refresh" size={15} />
                          </button>
                        </div>
                      </div>

                      {/* Sidebar info */}
                      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                        {/* Page info */}
                        <div className="card" style={{ padding:16 }}>
                          <h3 style={{ fontSize:15, fontWeight:800, marginBottom:4, lineHeight:1.3 }}>
                            {currentJob.page_title || 'Untitled'}
                          </h3>
                          <a href={currentJob.url} target="_blank" rel="noopener" style={{
                            fontSize:12, color:'var(--text-3)', textDecoration:'none',
                            display:'flex', alignItems:'center', gap:4,
                          }}>
                            <Icon name="external" size={11} />
                            <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{currentJob.url}</span>
                          </a>
                        </div>

                        {/* Stats */}
                        <div className="card" style={{ padding:16 }}>
                          <div style={{ fontSize:10, fontWeight:800, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.8px', marginBottom:12 }}>
                            Capture Details
                          </div>
                          {[
                            { label: 'Resolution', value: `${currentJob.capture?.pixel_width} × ${currentJob.capture?.pixel_height}`, icon: 'image' },
                            { label: 'File Size', value: fmtSize(currentJob.capture?.file_size_mb || 0), icon: 'download' },
                            { label: 'Duration', value: fmtTime(currentJob.duration_seconds || 0), icon: 'clock' },
                            { label: 'HTTP Status', value: currentJob.http_status, icon: 'globe' },
                            { label: 'DPR', value: `${currentJob.capture?.dpr}×`, icon: 'eye' },
                            { label: 'Stitched', value: currentJob.capture?.stitched ? `Yes (${currentJob.capture.sections} sections)` : 'No', icon: 'image' },
                          ].map(s => (
                            <div key={s.label} style={{
                              display:'flex', alignItems:'center', justifyContent:'space-between',
                              padding:'8px 0', borderBottom:'1px solid var(--border)',
                            }}>
                              <span style={{ fontSize:12, color:'var(--text-3)', display:'flex', alignItems:'center', gap:6 }}>
                                <Icon name={s.icon} size={13} />
                                {s.label}
                              </span>
                              <span style={{ fontSize:12, fontWeight:700, color:'var(--text)' }}>{s.value}</span>
                            </div>
                          ))}
                        </div>

                        {/* Fonts */}
                        {currentJob.page_meta?.fonts?.length > 0 && (
                          <div className="card" style={{ padding:16 }}>
                            <div style={{ fontSize:10, fontWeight:800, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.8px', marginBottom:10, display:'flex', alignItems:'center', gap:6 }}>
                              <Icon name="type" size={12} /> Fonts Detected
                            </div>
                            <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
                              {currentJob.page_meta.fonts.slice(0,6).map((f,i) => (
                                <span key={i} style={{
                                  fontSize:10, fontWeight:600, color:'var(--text-2)',
                                  background:'var(--surface-2)', border:'1px solid var(--border)',
                                  padding:'3px 8px', borderRadius:6,
                                  maxWidth:140, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                                }}>{f.replace(/"/g, '')}</span>
                              ))}
                            </div>
                          </div>
                        )}

                        {/* Progress log */}
                        <div className="card" style={{ padding:16 }}>
                          <div style={{ fontSize:10, fontWeight:800, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.8px', marginBottom:10, display:'flex', alignItems:'center', gap:6 }}>
                            <Icon name="list" size={12} /> Capture Log
                          </div>
                          <div ref={progressRef} style={{ maxHeight:200, overflow:'auto' }}>
                            {currentJob.steps?.map((step, i) => (
                              <div key={i} style={{
                                display:'flex', alignItems:'flex-start', gap:8,
                                padding:'4px 0', fontSize:11, color: step.msg.startsWith('ERROR') ? 'var(--red)' : 'var(--text-3)',
                              }}>
                                <div style={{
                                  width:6, height:6, borderRadius:'50%', marginTop:4, flexShrink:0,
                                  background: step.msg.startsWith('ERROR') ? 'var(--red)'
                                    : step.msg.startsWith('Done') ? 'var(--green)'
                                    : 'var(--text-3)',
                                }} />
                                <span>{step.msg}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Error state */}
                {currentJob?.status === 'error' && (
                  <div style={{ maxWidth:500, margin:'80px auto', textAlign:'center' }} className="fade-up">
                    <div style={{
                      width:64, height:64, borderRadius:16, background:'rgba(248,113,113,0.1)',
                      display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px',
                    }}>
                      <Icon name="x" size={28} style={{ color:'var(--red)' }} />
                    </div>
                    <h2 style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>Capture Failed</h2>
                    <p style={{ fontSize:13, color:'var(--text-3)', lineHeight:1.5, maxWidth:400, margin:'0 auto' }}>{currentJob.error}</p>
                    <button onClick={() => setCurrentJob(null)} className="btn btn-ghost" style={{ marginTop:20 }}>
                      Try again
                    </button>
                  </div>
                )}

                {/* Empty state */}
                {!capturing && !currentJob && (
                  <div style={{ maxWidth:500, margin:'100px auto', textAlign:'center' }} className="fade-up">
                    <div style={{
                      width:80, height:80, borderRadius:24,
                      background:'var(--gold-dim)',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      margin:'0 auto 24px',
                    }}>
                      <Icon name="camera" size={36} style={{ color:'var(--gold)' }} />
                    </div>
                    <h2 style={{ fontSize:22, fontWeight:900, marginBottom:8, letterSpacing:'-0.3px' }}>
                      Capture any website
                    </h2>
                    <p style={{ fontSize:14, color:'var(--text-3)', lineHeight:1.6, maxWidth:380, margin:'0 auto' }}>
                      Enter a URL above to get a pixel-perfect retina screenshot in seconds. 3× DPR, auto cookie dismissal, lazy-load handling.
                    </p>
                    <div style={{ display:'flex', justifyContent:'center', gap:24, marginTop:32 }}>
                      {[
                        { icon: 'zap', label: '3× Retina', sub: '4320px wide' },
                        { icon: 'eye', label: 'Smart Capture', sub: 'Cookie + overlay removal' },
                        { icon: 'image', label: 'Auto-stitch', sub: 'Tall page handling' },
                      ].map(f => (
                        <div key={f.label} style={{ textAlign:'center' }}>
                          <div style={{
                            width:44, height:44, borderRadius:12, background:'var(--surface-2)',
                            border:'1px solid var(--border)', display:'flex', alignItems:'center',
                            justifyContent:'center', margin:'0 auto 8px',
                          }}>
                            <Icon name={f.icon} size={18} style={{ color:'var(--gold)' }} />
                          </div>
                          <div style={{ fontSize:12, fontWeight:700, color:'var(--text)' }}>{f.label}</div>
                          <div style={{ fontSize:10, color:'var(--text-3)', marginTop:2 }}>{f.sub}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Lightbox */}
          {lightboxSrc && (
            <div className="lightbox-overlay" onClick={() => setLightboxSrc(null)}>
              <img src={lightboxSrc} alt="Full resolution" />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
