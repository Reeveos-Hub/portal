# ═══════════════════════════════════════════════════════════
# rezvo.app — Marketing site (public-facing)
# ═══════════════════════════════════════════════════════════
server {
    listen 80;
    server_name rezvo.app www.rezvo.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rezvo.app www.rezvo.app;

    ssl_certificate /etc/letsencrypt/live/rezvo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rezvo.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 20M;

    # ── Marketing homepage ──
    location = / {
        root /opt/rezvo-app/marketing;
        try_files /index.html =404;
    }

    # ── Static marketing pages ──
    location = /about.html { root /opt/rezvo-app/marketing; try_files /about.html =404; }
    location = /contact.html { root /opt/rezvo-app/marketing; try_files /contact.html =404; }
    location = /support.html { root /opt/rezvo-app/marketing; try_files /support.html =404; }
    location = /privacy.html { root /opt/rezvo-app/marketing; try_files /privacy.html =404; }
    location = /terms.html { root /opt/rezvo-app/marketing; try_files /terms.html =404; }
    location = /cookies.html { root /opt/rezvo-app/marketing; try_files /cookies.html =404; }

    # Clean URL redirects
    location = /about { return 301 /about.html; }
    location = /contact { return 301 /contact.html; }
    location = /support { return 301 /support.html; }
    location = /privacy { return 301 /privacy.html; }
    location = /terms { return 301 /terms.html; }
    location = /cookies { return 301 /cookies.html; }

    # ── Feature pages ──
    location /features/ {
        root /opt/rezvo-app/marketing;
        try_files $uri $uri.html =404;
    }

    # ── Industry pages ──
    location = /industries {
        root /opt/rezvo-app/marketing;
        try_files /industries/index.html =404;
    }
    location /industries/ {
        root /opt/rezvo-app/marketing;
        try_files $uri $uri.html $uri/index.html =404;
    }

    # ── Competitor pages ──
    location /competitors/ {
        root /opt/rezvo-app/marketing;
        try_files $uri $uri.html =404;
    }

    # ── Insights report pages ──
    location /insights/ {
        root /opt/rezvo-app/marketing;
        try_files /insights.html =404;
    }

    # ── Marketing static assets ──
    location /js/ {
        root /opt/rezvo-app/marketing;
        try_files $uri =404;
        add_header Content-Type application/javascript;
    }
    location /images/ {
        root /opt/rezvo-app/marketing;
        try_files $uri =404;
    }
    location /css/ {
        root /opt/rezvo-app/marketing;
        try_files $uri =404;
    }

    # ── Redirect portal paths to subdomain ──
    location /dashboard { return 301 https://portal.rezvo.app$request_uri; }
    location /login { return 301 https://portal.rezvo.app$request_uri; }
    location /signup { return 301 https://portal.rezvo.app$request_uri; }
    location /onboarding { return 301 https://portal.rezvo.app$request_uri; }
    location /book { return 301 https://portal.rezvo.app$request_uri; }
}

# ═══════════════════════════════════════════════════════════
# portal.rezvo.app — Owner Dashboard + Booking SPA
# ═══════════════════════════════════════════════════════════
server {
    listen 80;
    server_name portal.rezvo.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.rezvo.app;

    ssl_certificate /etc/letsencrypt/live/portal.rezvo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.rezvo.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 20M;

    # ── Backend API ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static uploads (avatars, images) ──
    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        proxy_set_header Host $host;
    }

    # ── SPA — serves entire React app ──
    location / {
        root /opt/rezvo-app/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}

# ═══════════════════════════════════════════════════════════
# api.rezvo.co.uk — Direct API access
# ═══════════════════════════════════════════════════════════
server {
    listen 80;
    server_name api.rezvo.co.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.rezvo.co.uk;
    ssl_certificate /etc/letsencrypt/live/rezvo.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rezvo.co.uk/privkey.pem;
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
