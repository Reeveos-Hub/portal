# rezvo.app — Marketing + Owner Portal
# Marketing pages: static HTML served by Nginx
# Portal (/dashboard, /login, etc.): React SPA
# API: proxied to FastAPI backend

server {
    listen 80;
    server_name rezvo.app www.rezvo.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rezvo.app www.rezvo.app;

    ssl_certificate /etc/letsencrypt/live/rezvo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rezvo.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # Marketing homepage — static HTML
    location = / {
        root /var/www/rezvo-app/marketing;
        try_files /index.html =404;
    }

    # Competitor pages — static HTML
    location /competitors/ {
        root /var/www/rezvo-app/marketing;
        try_files $uri $uri.html =404;
    }

    # Portal SPA (dashboard, auth, onboarding)
    location / {
        root /var/www/rezvo-app/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        alias /var/www/rezvo-app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# API subdomain — shared by both rezvo.app and rezvo.co.uk
server {
    listen 80;
    server_name api.rezvo.co.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.rezvo.co.uk;

    ssl_certificate /etc/letsencrypt/live/rezvo.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rezvo.co.uk/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
