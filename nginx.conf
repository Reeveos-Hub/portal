# ═══════════════════════════════════════════════════════════
# rezvo.app — Marketing site (public-facing)
# ═══════════════════════════════════════════════════════════
server {
    listen 80;
    server_name rezvo.app www.rezvo.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rezvo.app www.rezvo.app;

    ssl_certificate /etc/letsencrypt/live/rezvo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rezvo.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 20M;

    # ── Security headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Marketing homepage ──
    location = / {
        root /var/www/reeveos.app;
        try_files /index.html =404;
    }

    # ── SEO files ──
    location = /sitemap.xml { root /var/www/reeveos.app; try_files /sitemap.xml =404; }
    location = /sitemap.html { root /var/www/reeveos.app; try_files /sitemap.html =404; }
    location = /sitemap { return 301 /sitemap.html; }
    location = /robots.txt { root /var/www/reeveos.app; try_files /robots.txt =404; }
    location = /llms.txt { root /var/www/reeveos.app; try_files /llms.txt =404; }

    # ── Static marketing pages ──
    location = /about.html { root /var/www/reeveos.app; try_files /about.html =404; }
    location = /contact.html { root /var/www/reeveos.app; try_files /contact.html =404; }
    location = /support.html { root /var/www/reeveos.app; try_files /support.html =404; }
    location = /privacy.html { root /var/www/reeveos.app; try_files /privacy.html =404; }
    location = /terms.html { root /var/www/reeveos.app; try_files /terms.html =404; }
    location = /cookies.html { root /var/www/reeveos.app; try_files /cookies.html =404; }

    # Clean URL redirects
    location = /about { return 301 /about.html; }
    location = /contact { return 301 /contact.html; }
    location = /support { return 301 /support.html; }
    location = /privacy { return 301 /privacy.html; }
    location = /terms { return 301 /terms.html; }
    location = /cookies { return 301 /cookies.html; }

    # ── Feature pages ──
    location /features/ {
        root /var/www/reeveos.app;
        try_files $uri $uri.html =404;
    }

    # ── Industry pages ──
    location = /industries {
        root /var/www/reeveos.app;
        try_files /industries/index.html =404;
    }
    location /industries/ {
        root /var/www/reeveos.app;
        try_files $uri $uri.html $uri/index.html =404;
    }

    # ── Competitor pages ──
    location /competitors/ {
        root /var/www/reeveos.app;
        try_files $uri $uri.html =404;
    }

    # ── Insights report pages ──
    location /insights/ {
        root /var/www/reeveos.app;
        try_files /insights.html =404;
    }

    # ── Marketing static assets ──
    location /js/ {
        root /var/www/reeveos.app;
        try_files $uri =404;
        add_header Content-Type application/javascript;
    }
    location /images/ {
        root /var/www/reeveos.app;
        try_files $uri =404;
    }
    location /css/ {
        root /var/www/reeveos.app;
        try_files $uri =404;
    }

    # ── Backend API (chatbot + support endpoints for marketing site) ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Redirect portal paths to subdomain ──
    location /dashboard { return 301 https://portal.rezvo.app$request_uri; }
    location /admin { return 301 https://portal.rezvo.app$request_uri; }
    location /login { return 301 https://portal.rezvo.app$request_uri; }
    location /signup { return 301 https://portal.rezvo.app$request_uri; }
    location /onboarding { return 301 https://portal.rezvo.app$request_uri; }
    location /book { return 301 https://book.rezvo.app$request_uri; }
}

# ═══════════════════════════════════════════════════════════
# portal.rezvo.app — Owner Dashboard + Booking SPA
# ═══════════════════════════════════════════════════════════
server {
    listen 80;
    server_name portal.rezvo.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.rezvo.app;

    ssl_certificate /etc/letsencrypt/live/portal.rezvo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.rezvo.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 20M;

    # ── Security headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Backend API ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static uploads (avatars, images) ──
    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        proxy_set_header Host $host;
    }

    # ── Redirect old /book/ paths to book.rezvo.app ──
    location ~ ^/book/(.*)$ {
        return 301 https://book.rezvo.app/$1;
    }

    # ── SPA — serves entire React app ──
    location / {
        root /opt/rezvo-app/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}

# ═══════════════════════════════════════════════════════════
# book.rezvo.app — Public Booking Pages (clean URLs)
# ═══════════════════════════════════════════════════════════
server {
    listen 80;
    server_name book.rezvo.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name book.rezvo.app;

    ssl_certificate /etc/letsencrypt/live/book.rezvo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/book.rezvo.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 20M;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Note: No X-Frame-Options DENY — booking pages need to be embeddable in iframes
    add_header Content-Security-Policy "frame-ancestors 'self' https://*.rezvo.app https://*.rezvo.co.uk" always;

    # ── Backend API ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static uploads (avatars, images) ──
    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        proxy_set_header Host $host;
    }

    # ── Redirect old /book/ prefix paths ──
    location ~ ^/book/(.*)$ {
        return 301 https://book.rezvo.app/$1;
    }

    # ── Block dashboard/admin paths on booking domain ──
    location /dashboard { return 301 https://portal.rezvo.app/dashboard; }
    location /admin { return 301 https://portal.rezvo.app/admin; }
    location /login { return 301 https://portal.rezvo.app/login; }

    # ── SPA — serves booking React app ──
    location / {
        root /opt/rezvo-app/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}

