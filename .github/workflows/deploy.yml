name: Deploy Rezvo.app to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Clone if first time
            if [ ! -d "/opt/rezvo-app/.git" ]; then
              git clone https://github.com/Ambassadorbtc/Rezvo.app.git /opt/rezvo-app
            fi

            cd /opt/rezvo-app
            git fetch origin main
            git reset --hard origin/main

            # Backend: install deps in venv
            cd /opt/rezvo-app/backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            ./venv/bin/pip install -r requirements.txt -q

            # Frontend: install + build
            cd /opt/rezvo-app/frontend
            npm install --silent
            npm run build

            # Update systemd service
            cat > /etc/systemd/system/rezvo-backend.service << 'SVCEOF'
            [Unit]
            Description=Rezvo Backend API
            After=network.target mongod.service

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/rezvo-app/backend
            ExecStart=/opt/rezvo-app/backend/venv/bin/uvicorn server:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=10
            Environment=PATH=/opt/rezvo-app/backend/venv/bin:/usr/local/bin:/usr/bin:/bin

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            systemctl daemon-reload
            systemctl restart rezvo-backend

            # Nginx
            cp /opt/rezvo-app/nginx.conf /etc/nginx/sites-available/rezvo-app
            ln -sf /etc/nginx/sites-available/rezvo-app /etc/nginx/sites-enabled/rezvo-app
            nginx -t && systemctl reload nginx

            # Verify
            sleep 3
            curl -s -o /dev/null -w "Backend: %{http_code}" http://127.0.0.1:8000/ || echo "Backend not responding"

            echo ""
            echo "✅ REZVO.APP DEPLOYMENT COMPLETE"
