name: Deploy Rezvo.app to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # Clone if first time
            if [ ! -d "/opt/rezvo-app/.git" ]; then
              git clone https://github.com/Ambassadorbtc/Rezvo.app.git /opt/rezvo-app
            fi

            cd /opt/rezvo-app
            git fetch origin main
            git reset --hard origin/main

            # Backend: use existing venv from /opt/rezvo or create new one
            cd /opt/rezvo-app/backend
            if [ -d "/opt/rezvo/backend/venv" ] && [ ! -d "venv" ]; then
              echo "Copying existing venv..."
              cp -r /opt/rezvo/backend/venv .
            fi
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            venv/bin/python -m pip install -r requirements.txt -q

            # Frontend: install + build
            cd /opt/rezvo-app/frontend
            npm install --silent
            npm run build

            # Update systemd service
            printf '[Unit]\nDescription=Rezvo Backend API\nAfter=network.target mongod.service\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/rezvo-app/backend\nExecStart=/opt/rezvo-app/backend/venv/bin/uvicorn server:app --host 0.0.0.0 --port 8000\nRestart=always\nRestartSec=10\nEnvironment=PATH=/opt/rezvo-app/backend/venv/bin:/usr/local/bin:/usr/bin:/bin\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/rezvo-backend.service

            systemctl daemon-reload
            systemctl restart rezvo-backend

            # Nginx
            cp /opt/rezvo-app/nginx.conf /etc/nginx/sites-available/rezvo-app
            ln -sf /etc/nginx/sites-available/rezvo-app /etc/nginx/sites-enabled/rezvo-app
            nginx -t && systemctl reload nginx

            sleep 3
            curl -s -o /dev/null -w "Backend: %{http_code}\n" http://127.0.0.1:8000/ || echo "Backend not responding"
            echo "✅ REZVO.APP DEPLOYMENT COMPLETE"
