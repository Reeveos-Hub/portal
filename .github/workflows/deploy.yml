name: Deploy Rezvo.app to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # ── Pull latest code ──
            if [ ! -d "/opt/rezvo-app/.git" ]; then
              git clone https://github.com/Ambassadorbtc/Rezvo.app.git /opt/rezvo-app
            fi

            cd /opt/rezvo-app
            git fetch origin main
            git reset --hard origin/main

            # ── Backend deps ──
            cd /opt/rezvo-app/backend
            pip3 install -r requirements.txt --break-system-packages -q 2>/dev/null || pip3 install -r requirements.txt -q

            # ── Frontend build ──
            cd /opt/rezvo-app/frontend
            npm install --silent
            VITE_API_URL=/api npm run build

            # ── Backend service ──
            # Ensure backend .env has required keys
            touch /opt/rezvo-app/backend/.env
            grep -q 'ANTHROPIC_API_KEY' /opt/rezvo-app/backend/.env || echo 'ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}' >> /opt/rezvo-app/backend/.env
            # Update if already exists
            sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|" /opt/rezvo-app/backend/.env

            # Google Gemini (floor plan AI)
            if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
              grep -q 'GEMINI_API_KEY' /opt/rezvo-app/backend/.env && sed -i "s|^GEMINI_API_KEY=.*|GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}|" /opt/rezvo-app/backend/.env || echo 'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}' >> /opt/rezvo-app/backend/.env
            fi

            # Floor plan LLM provider (gemini, anthropic, xai, or openai)
            grep -q 'FLOOR_PLAN_LLM_PROVIDER' /opt/rezvo-app/backend/.env && sed -i "s|^FLOOR_PLAN_LLM_PROVIDER=.*|FLOOR_PLAN_LLM_PROVIDER=gemini|" /opt/rezvo-app/backend/.env || echo 'FLOOR_PLAN_LLM_PROVIDER=gemini' >> /opt/rezvo-app/backend/.env

            # Resend (email)
            if [ -n "${{ secrets.RESEND_API_KEY }}" ]; then
              grep -q 'RESEND_API_KEY' /opt/rezvo-app/backend/.env && sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}|" /opt/rezvo-app/backend/.env || echo 'RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}' >> /opt/rezvo-app/backend/.env
            fi

            # Sendly SMS
            if [ -n "${{ secrets.SENDLY_API_KEY }}" ]; then
              grep -q 'SENDLY_API_KEY' /opt/rezvo-app/backend/.env && sed -i "s|^SENDLY_API_KEY=.*|SENDLY_API_KEY=${{ secrets.SENDLY_API_KEY }}|" /opt/rezvo-app/backend/.env || echo 'SENDLY_API_KEY=${{ secrets.SENDLY_API_KEY }}' >> /opt/rezvo-app/backend/.env
            fi

            cat > /etc/systemd/system/rezvo-backend.service << 'EOF'
            [Unit]
            Description=Rezvo Backend API
            After=network.target mongod.service

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/rezvo-app/backend
            EnvironmentFile=-/opt/rezvo-app/backend/.env
            ExecStart=/usr/local/bin/uvicorn server:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            EOF
            systemctl daemon-reload
            systemctl restart rezvo-backend

            # ── SSL cert for portal.rezvo.app (if DNS is ready) ──
            if ! [ -d /etc/letsencrypt/live/portal.rezvo.app ]; then
              echo "Attempting SSL cert for portal.rezvo.app..."
              certbot certonly --nginx -d portal.rezvo.app --non-interactive --agree-tos -m admin@rezvo.app || echo "⚠️ portal.rezvo.app cert not yet available (DNS may not be ready)"
            fi

            # ── Nginx — all paths serve from /opt/rezvo-app directly ──
            # If portal cert doesn't exist yet, use temp config without portal block
            if [ -d /etc/letsencrypt/live/portal.rezvo.app ]; then
              cp /opt/rezvo-app/nginx.conf /etc/nginx/sites-available/rezvo-app
            else
              echo "⚠️ Using nginx config without portal block (cert pending)"
              # Strip portal block so nginx doesn't fail on missing cert
              sed '/portal\.rezvo\.app/,/^}/d' /opt/rezvo-app/nginx.conf > /etc/nginx/sites-available/rezvo-app
            fi
            ln -sf /etc/nginx/sites-available/rezvo-app /etc/nginx/sites-enabled/rezvo-app
            nginx -t && systemctl reload nginx

            sleep 3

            # ── Ensure admin account ──
            if [ -f /opt/rezvo-app/backend/setup_admin.py ]; then
              cd /opt/rezvo-app/backend
              python3 setup_admin.py || echo "Admin setup note: check logs"
            fi

            # ── Run data migrations ──
            if [ -f /opt/rezvo-app/backend/reset_floor_plan.py ]; then
              cd /opt/rezvo-app/backend
              python3 reset_floor_plan.py || echo "Floor plan reset note: check logs"
              rm -f reset_floor_plan.py  # One-time migration
            fi

            if [ -f /opt/rezvo-app/backend/seed_real_data.py ]; then
              cd /opt/rezvo-app/backend
              python3 seed_real_data.py || echo "Seed data note: check logs"
              rm -f seed_real_data.py  # One-time seed
            fi

            if [ -f /opt/rezvo-app/backend/fix_micho_hours.py ]; then
              cd /opt/rezvo-app/backend
              python3 fix_micho_hours.py || echo "Migration note: check logs"
            fi

            echo "✅ DEPLOY COMPLETE"
