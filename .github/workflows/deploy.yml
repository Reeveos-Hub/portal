name: Deploy Rezvo.app to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            if [ ! -d "/opt/rezvo-app/.git" ]; then
              git clone https://github.com/Ambassadorbtc/Rezvo.app.git /opt/rezvo-app
            fi

            cd /opt/rezvo-app
            git fetch origin main
            git reset --hard origin/main

            cd /opt/rezvo-app/backend
            pip3 install -r requirements.txt --break-system-packages -q 2>/dev/null || pip3 install -r requirements.txt -q

            cd /opt/rezvo-app/frontend
            npm install --silent
            VITE_API_URL=https://rezvo.app/api npm run build

            printf '[Unit]\nDescription=Rezvo Backend API\nAfter=network.target mongod.service\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/rezvo-app/backend\nExecStart=/usr/local/bin/uvicorn server:app --host 0.0.0.0 --port 8000\nRestart=always\nRestartSec=10\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/rezvo-backend.service
            systemctl daemon-reload
            systemctl restart rezvo-backend

            cp /opt/rezvo-app/nginx.conf /etc/nginx/sites-available/rezvo-app
            ln -sf /etc/nginx/sites-available/rezvo-app /etc/nginx/sites-enabled/rezvo-app
            nginx -t && systemctl reload nginx

            # Copy marketing pages to web root
            mkdir -p /var/www/rezvo-app/competitors
            cp /opt/rezvo-app/marketing/index.html /var/www/rezvo-app/index.html
            cp /opt/rezvo-app/marketing/competitors/*.html /var/www/rezvo-app/competitors/

            sleep 3

            # Run setup script if it exists
            if [ -f /opt/rezvo-app/backend/setup_enterprise.py ]; then
              cd /opt/rezvo-app/backend
              python3 setup_enterprise.py || echo "Setup script failed (may be ok if already run)"
            fi

            echo "✅ DEPLOY COMPLETE"
