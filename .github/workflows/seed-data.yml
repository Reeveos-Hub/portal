name: Seed Demo Data

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Seed data on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            cd /opt/rezvo-app
            git fetch origin main
            git reset --hard origin/main
            cd /opt/rezvo-app/backend
            pip3 install passlib bcrypt --break-system-packages -q 2>/dev/null || true
            python3 seed_businesses.py
